<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>srgnt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      /* Prevent FOUC */
      html { visibility: hidden; }
      html.fonts-loaded { visibility: visible; }
    </style>
    <script>
      document.fonts.ready.then(() => {
        document.documentElement.classList.add('fonts-loaded');
      });
      /* Fallback if fonts fail to load within 1s */
      setTimeout(() => {
        document.documentElement.classList.add('fonts-loaded');
      }, 1000);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
